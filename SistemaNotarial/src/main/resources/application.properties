# ══════════════════════════════════════════════════════════
#  Sistema Notarial — application.properties
#  INSTRUCCIONES: Cambia usuario y contraseña de MySQL abajo
# ══════════════════════════════════════════════════════════

# ── Servidor ──────────────────────────────────────────────
server.port=8080

# ── Base de datos MySQL ───────────────────────────────────
# CAMBIA ESTOS VALORES con tus credenciales de MySQL:
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_notarial?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Monik2026@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
# "validate" en producción; "update" para desarrollo
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Inicialización SQL ────────────────────────────────────
# Spring ejecuta schema.sql y data.sql al arrancar
spring.sql.init.mode=never
# Cambia a "always" SOLO la primera vez para crear e insertar datos,
# luego vuelve a "never" para no duplicar datos en cada reinicio.

# ── Nombres de tablas en minúsculas ──────────────────────
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Jackson (JSON) ────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
